    Projects:
      - name: Economic Indicators in Default Forecasting
        summary: >-
          Incorporation of macroeconomic determinants into default forecasts using a Vector
          Autoregressive (VAR) methodology via Composite Leading Indicators. Coordinator: Ricardo
          Gonçalves da Silva.
        start_date: 2006
        end_date: 2008

      - name: Econometric Methods in Macroeconomics and Finance
        summary: >-
          Development of econometric methods in macroeconomics and finance. Team: Ricardo Gonçalves
          da Silva (member); Milton Barossi Filho (coordinator).
        start_date: 2004
        end_date: 2005

      - name: New Econometric Techniques for the Study of Economic Growth Models
        summary: >-
          Development of new statistical methodologies addressing econometric issues in economic
          growth analysis, isolating groups of countries homogeneous with respect to unit roots. Team:
          Ricardo Gonçalves da Silva, Milton Barossi Filho (members); Eliezer Martins Diniz
          (coordinator). Funded by CNPq.
        start_date: 2003
        end_date: 2005


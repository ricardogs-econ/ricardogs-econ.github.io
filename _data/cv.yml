cv:
  name: Ricardo Gonçalves da Silva
  label: Researcher in Economics & Statistics
  email: ""
  location: São Paulo, Brazil
  image: ""
  summary: >-
    Holds a B.A. in Economics from the University of São Paulo (USP, 2001) and an M.Sc. in Computer
    Science and Computational Mathematics - Statistics from the University of São Paulo (USP, 2004).
    Experience in Economics and Statistics, with an emphasis on Mathematical, Econometric, and
    Statistical Methods and Models. Part-time professor at USP, UNESP, and UNIP, with experience
    teaching undergraduate and graduate courses. Beyond academia, has spent over 14 years leading
    data science and credit-risk modeling teams in the banking, fintech, and technology sectors,
    applying econometric and machine-learning methods to real-world risk, forecasting, and
    analytics problems.

